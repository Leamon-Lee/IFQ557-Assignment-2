<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundWave Events | Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
</head>
<body class="loading-body">
  <main class="loading-page">
    <div class="loading-cinematic-backdrop" aria-hidden="true"></div>
    <canvas class="loading-show-canvas" aria-hidden="true"></canvas>
    <div class="loading-moving-lights" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="loading-atmosphere" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="loading-cursor-glow" aria-hidden="true"></div>
    <div class="loading-ripple-layer" aria-hidden="true"></div>

    <nav class="container loading-nav" aria-label="Welcome navigation">
      <a class="loading-logo" href="{{ url_for('events.index') }}" aria-label="SoundWave Events home">
        <span class="brand-mark">SW</span>
        <span>SoundWave</span>
      </a>
      <span class="loading-nav-meta">Concerts · Tickets · Campus nights</span>
    </nav>

    <section class="container loading-shell">
      <div class="loading-hero">
        <div class="loading-brand">
          <span>LIVE MUSIC EXPERIENCE</span>
        </div>

        <h1>SoundWave Events</h1>
        <p class="loading-subtitle">Feel the rhythm. Discover your next live show.</p>

        <div class="loading-wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="loading-actions">
          <a class="btn btn-primary-action btn-lg loading-enter" href="{{ url_for('events.index') }}">
            Enter SoundWave
          </a>
          <p class="loading-hint">Move your cursor and feel the sound.</p>
        </div>
      </div>
    </section>

  </main>

  <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
</body>
</html>
