<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundWave Events | Welcome</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style/style.css') }}">
</head>
<body class="loading-body">
  <main class="loading-page">
    <video class="loading-video" autoplay muted loop playsinline poster="{{ url_for('static', filename='img/soundwave-loading-bg.png') }}" aria-hidden="true">
      <source src="{{ url_for('static', filename='video/concert-ambient.mp4') }}" type="video/mp4">
    </video>
    <div class="loading-light-beams" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="loading-energy-field" aria-hidden="true"></div>
    <div class="loading-ripple-layer" aria-hidden="true"></div>

    <nav class="container loading-nav" aria-label="Welcome navigation">
      <a class="loading-logo" href="{{ url_for('events.index') }}" aria-label="SoundWave Events home">
        <span class="brand-mark">SW</span>
        <span>SoundWave</span>
      </a>
      <span class="loading-nav-meta">Concerts · Tickets · Campus nights</span>
    </nav>

    <section class="container loading-shell">
      <div class="loading-hero">
        <div class="loading-brand">
          <span>LIVE MUSIC EXPERIENCE</span>
        </div>

        <h1>SoundWave Events</h1>
        <p class="loading-subtitle">Feel the rhythm. Discover your next live show.</p>

        <div class="loading-wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="loading-actions">
          <a class="btn btn-primary-action btn-lg loading-enter" href="{{ url_for('events.index') }}">
            Enter SoundWave
          </a>
          <p class="loading-hint">Move your cursor and feel the sound.</p>
        </div>
      </div>
    </section>

    <div class="loading-bottom-bar" aria-hidden="true">
      <span>Live shows</span>
      <span>Dynamic stages</span>
      <span>Easy booking</span>
    </div>
  </main>

  <script>
    (() => {
      const layer = document.querySelector('.loading-ripple-layer');
      if (!layer) return;

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) {
        document.querySelector('.loading-video')?.pause();
        return;
      }

      let lastMove = 0;

      const createRipple = (x, y, strong = false) => {
        const ripple = document.createElement('span');
        ripple.className = strong ? 'sound-ripple sound-ripple-strong' : 'sound-ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        layer.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      };

      window.addEventListener('pointermove', (event) => {
        const now = Date.now();
        if (now - lastMove < 85) return;
        lastMove = now;
        createRipple(event.clientX, event.clientY);
      }, { passive: true });

      window.addEventListener('pointerdown', (event) => {
        createRipple(event.clientX, event.clientY, true);
      }, { passive: true });
    })();
  </script>
</body>
</html>
