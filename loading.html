<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundWave Events | Welcome</title>
  <link href="static/style/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style/style.css">
</head>
<body class="loading-body">
  <main class="loading-page">
    <div class="loading-ripple-layer" aria-hidden="true"></div>

    <section class="container loading-shell">
      <div class="loading-card">
        <div class="loading-brand">
          <span class="brand-mark">SW</span>
          <span>LIVE MUSIC EXPERIENCE</span>
        </div>

        <h1>SoundWave Events</h1>
        <p class="loading-subtitle">Feel the rhythm. Discover your next live show.</p>

        <div class="loading-wave" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <a class="btn btn-primary-action btn-lg loading-enter" href="index.html">
          Enter SoundWave
        </a>

        <p class="loading-hint">Move your cursor and feel the sound.</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const layer = document.querySelector('.loading-ripple-layer');
      if (!layer) return;

      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (reduceMotion) return;

      let lastMove = 0;

      const createRipple = (x, y, strong = false) => {
        const ripple = document.createElement('span');
        ripple.className = strong ? 'sound-ripple sound-ripple-strong' : 'sound-ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        layer.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      };

      window.addEventListener('pointermove', (event) => {
        const now = Date.now();
        if (now - lastMove < 85) return;
        lastMove = now;
        createRipple(event.clientX, event.clientY);
      }, { passive: true });

      window.addEventListener('pointerdown', (event) => {
        createRipple(event.clientX, event.clientY, true);
      }, { passive: true });
    })();
  </script>
</body>
</html>
